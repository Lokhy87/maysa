nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['^http://localhost:4200$','^http://127\.0\.0\.1:4200$', '^https://maysamasajes\.com$', '^https://www\.maysamasajes\.com$']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'Accept-Language']
        expose_headers: ['Link']
        max_age: 3600
    paths:
        '^/api/': ~

