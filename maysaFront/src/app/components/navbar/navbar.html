<nav class="maysa-navbar">
  <div class="nav-container">
    <a class="logo" routerLink="/">
      <img src="/images/logo.png" alt="Maysa" />
    </a>

    <button class="menu-toggle" (click)="toggleMenu()" aria-label="Abrir menú">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-menu" [class.open]="menuOpen">
      <li>
        <a
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()"
          >{{ 'NAV.HOME' | translate }}</a
        >
      </li>
      <li>
        <a routerLink="/experiences" routerLinkActive="active" (click)="closeMenu()"
          >Experiencias</a
        >
      </li>
      <li>
        <a routerLink="/aboutus" routerLinkActive="active" (click)="closeMenu()">Sobre Maysa</a>
      </li>
      <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contacto</a></li>
    </ul>
    <div class="language-selector">
      <button
        type="button"
        class="language-button"
        [class.active]="isCurrentLanguage('es')"
        (click)="changeLanguage('es')"
        aria-label="Cambiar idioma a español"
      >
        ES
      </button>
      <span class="language-separator">|</span>
      <button
        type="button"
        class="language-button"
        [class.active]="isCurrentLanguage('en')"
        (click)="changeLanguage('en')"
        aria-label="Change language to English"
      >
        EN
      </button>
    </div>
  </div>
</nav>
